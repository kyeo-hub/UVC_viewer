name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Get version name
        id: version
        run: |
          # gradlew properties 把 versionName 输出为 "versionName: 1.0.0"，跨平台用 grep -E
          VERSION=$(./gradlew -q properties --no-daemon \
            | grep -E '^versionName:' \
            | head -1 \
            | sed -E 's/^versionName:[[:space:]]*//')
          if [ -z "${VERSION}" ]; then
            # 兜底：从 git tag 名取版本（v1.0.0 → 1.0.0）
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Rename APK
        run: |
          APK_DIR="app/build/outputs/apk/release"
          VERSION="${{ steps.version.outputs.version }}"
          cp "${{ steps.sign.outputs.signedReleaseFile }}" \
             "${APK_DIR}/PureView-${VERSION}.apk"
          echo "Final APK: ${APK_DIR}/PureView-${VERSION}.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pureview-apk
          # 只上传 renamed 的最终 APK，跳过 unsigned/aligned/signed 中间产物
          path: app/build/outputs/apk/release/PureView-*.apk
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: pureview-apk
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.apk
